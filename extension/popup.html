<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 320px;
            background-color: #1e1e1e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        /* Status Marker */
        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: #2d2d2d;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.connected {
            background-color: #00FF00;
            box-shadow: 0 0 8px #00FF00;
            animation: pulse 2s infinite;
        }

        .dot.disconnected {
            background-color: #FF0000;
            box-shadow: 0 0 8px #FF0000;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #252526;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 14px;
            font-weight: bold;
            margin-top: 4px;
            color: #fff;
        }

        /* Last Signal */
        .section-title {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .log-box {
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            min-height: 80px;
            color: #ccc;
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px dashed #333;
            padding-bottom: 6px;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .highlight {
            color: #4ec9b0;
        }

        .val {
            color: #ce9178;
        }

        /* Footer */
        .footer {
            margin-top: 15px;
            font-size: 10px;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:8px;">
            <h3>Sentinel</h3>
            <button id="popout-btn"
                style="background:none; border:none; cursor:pointer; padding: 4px; display: flex; align-items: center;"
                title="Pop Out Window">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            </button>
        </div>
        <div class="status-container">
            <span id="status-dot" class="dot disconnected"></span>
            <span id="status-text">OFFLINE</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">System Mode</div>
            <div id="mode-val" class="stat-value">--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">System State</div>
            <div id="state-val" class="stat-value">--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Source Authority</div>
            <div id="pulse-val" class="stat-value">--</div>
        </div>
    </div>


    <div class="section-title">Last Signal Transmission</div>
    <div id="last-signal" class="log-box">
        <div style="color: #666; text-align: center; margin-top: 30px;">No Data</div>
    </div>

    <div class="footer">
        Client v1.3 &bull; <span id="hb-time">Initializing...</span>
    </div>
    <script src="popup.js"></script>
</body>

</html>
